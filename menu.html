<style>
  /* --- LA BARRE DE NAVIGATION --- */
  .sh-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    z-index: 9999; /* Reste toujours au-dessus du reste */
    background: rgba(13, 14, 21, 0.7); /* Fond très sombre et transparent */
    backdrop-filter: blur(15px); /* Effet verre dépoli */
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    box-sizing: border-box;
    transition: all 0.3s ease;
  }

  /* --- LE LOGO (À GAUCHE) --- */
  .sh-nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    text-decoration: none;
    /* Dégradé comme ton nom dans l'en-tête */
    background: linear-gradient(to right, #00E5FF, #7C4DFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  /* --- LES LIENS (À DROITE) --- */
  .sh-nav-links {
    display: flex;
    gap: 35px;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .sh-nav-item a {
    color: #E0E0E0;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    transition: color 0.3s ease;
  }

  /* L'effet Néon au survol d'un lien */
  .sh-nav-item a:hover {
    color: #00E5FF;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  }

  /* La barre lumineuse qui apparaît sous le lien */
  .sh-nav-item a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -6px;
    left: 0;
    background: #00E5FF;
    box-shadow: 0 0 8px #00E5FF;
    transition: width 0.3s ease;
  }

  .sh-nav-item a:hover::after {
    width: 100%;
  }

  /* --- LE MENU HAMBURGER (POUR MOBILE) --- */
  .sh-hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 6px;
    z-index: 10000;
  }

  .sh-hamburger span {
    width: 30px;
    height: 3px;
    background-color: #00E5FF;
    border-radius: 5px;
    transition: all 0.3s ease;
    box-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
  }

  /* --- ADAPTATION MOBILE --- */
  @media (max-width: 900px) {
    .sh-hamburger {
      display: flex;
    }

    .sh-nav-links {
      position: fixed;
      top: 0;
      right: -100%; /* Caché par défaut en dehors de l'écran */
      width: 250px;
      height: 100vh;
      background: rgba(13, 14, 21, 0.95);
      backdrop-filter: blur(20px);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      transition: right 0.4s ease;
      border-left: 1px solid rgba(0, 229, 255, 0.2);
    }

    /* Classe ajoutée par Javascript quand on clique sur le menu */
    .sh-nav-links.active {
      right: 0;
    }

    /* Animation du bouton hamburger pour se transformer en croix (X) */
    .sh-hamburger.active span:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
      background-color: #FF2A85;
      box-shadow: 0 0 5px rgba(255, 42, 133, 0.5);
    }
    .sh-hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    .sh-hamburger.active span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
      background-color: #FF2A85;
      box-shadow: 0 0 5px rgba(255, 42, 133, 0.5);
    }
  }
</style>

<nav class="sh-navbar">
  <a href="#" class="sh-nav-logo">W. GRAH</a>
  
  <ul class="sh-nav-links" id="nav-links">
    <li class="sh-nav-item"><a href="#accueil">Accueil</a></li>
    <li class="sh-nav-item"><a href="#services">Services</a></li>
    <li class="sh-nav-item"><a href="#portfolio">Portfolio</a></li>
    <li class="sh-nav-item"><a href="#parcours">Parcours</a></li>
    <li class="sh-nav-item"><a href="#contact">Contact</a></li>
  </ul>

  <!-- Bouton pour Mobile -->
  <div class="sh-hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<!-- Script pour faire fonctionner le menu sur téléphone -->
<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');
  const navItems = document.querySelectorAll('.sh-nav-item a');

  // Ouvre et ferme le menu au clic sur le bouton
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('active');
  });

  // Ferme le menu automatiquement quand on clique sur un lien (sur mobile)
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      navLinks.classList.remove('active');
      hamburger.classList.remove('active');
    });
  });
</script>

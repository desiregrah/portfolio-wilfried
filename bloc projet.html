<style>
  /* La grille pour afficher tes projets (3 par ligne sur grand écran) */
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    padding: 20px 0;
  }

  /* Le conteneur de chaque projet */
  .portfolio-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    border: 1px solid #2A2B36;
  }

  /* L'image de fond (capture d'écran de ton site) */
  .portfolio-item img {
    width: 100%;
    height: 250px;
    object-fit: cover; 
    transition: transform 0.6s ease;
    display: block;
  }

  /* Le calque sombre avec effet Néon qui apparaît au survol */
  .portfolio-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(26, 27, 38, 0.9); /* Fond sombre transparent */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0; 
    transition: all 0.4s ease;
    border: 2px solid transparent;
    border-radius: 12px;
  }

  /* Animation au survol */
  .portfolio-item:hover img {
    transform: scale(1.1); /* L'image zoome légèrement */
  }
  .portfolio-item:hover .portfolio-overlay {
    opacity: 1; /* Le calque apparaît */
    border-color: #00E5FF; /* Bordure Cyan */
  }

  /* Typographie des textes du projet */
  .portfolio-title {
    color: #FFFFFF;
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    margin: 0 0 5px 0;
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.4s ease;
  }

  .portfolio-category {
    color: #A0A0A0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 20px 0;
    transform: translateY(20px);
    transition: transform 0.4s ease 0.1s;
  }

  /* Le bouton "Voir le site" */
  .portfolio-link {
    color: #00E5FF;
    border: 1px solid #00E5FF;
    padding: 8px 20px;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    transform: translateY(20px);
    transition: all 0.4s ease 0.2s;
  }

  .portfolio-link:hover {
    background: #00E5FF;
    color: #121212;
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  }

  /* Révélation des éléments en cascade */
  .portfolio-item:hover .portfolio-title,
  .portfolio-item:hover .portfolio-category,
  .portfolio-item:hover .portfolio-link {
    transform: translateY(0);
  }
</style>
